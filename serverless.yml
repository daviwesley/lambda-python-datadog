# "org" ensures this Service is used with the correct Serverless Framework Access Key.
org: daviwesley
service: lambda-python-datadog

frameworkVersion: ">=3.40.0 <4.0.0"

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - serverless-python-requirements  # bundles pip dependencies automatically
  - serverless-plugin-datadog       # instruments Lambda with Datadog

# ---------------------------------------------------------------------------
# Custom settings
# ---------------------------------------------------------------------------
custom:
  # ---- Python requirements -----------------------------------------------
  pythonRequirements:
    dockerizePip: true        # always use Docker for consistency
    slim: true                # strip tests / __pycache__ to reduce package size
    strip: false              # keep native library symbols (needed by ddtrace)
    useStaticCache: true
    useDownloadCache: true

  # ---- Datadog plugin -------------------------------------------------------
  # The plugin automatically adds the Datadog Lambda layer and injects the
  # dd-trace forwarder. DD_API_KEY is supplied at deploy time via the
  # DD_API_KEY environment variable (set in GitHub Actions Variables).
  datadog:
    site: ${env:DD_SITE, "datadoghq.com"}
    apiKey: ${env:DD_API_KEY}  # raw key injected from GitHub Actions Variable
    enableDDTracing: true
    enableDDLogs: true
    enableEnhancedMetrics: true
    captureLambdaPayload: false       # set true to log full request/response (PII risk)
    logLevel: "warn"
    addLayers: true
    flushMetricsToLogs: true

# ---------------------------------------------------------------------------
# Provider
# ---------------------------------------------------------------------------
provider:
  name: aws
  runtime: python3.14
  stage: ${opt:stage, "dev"}
  region: ${opt:region, "us-east-1"}
  memorySize: 128
  timeout: 30
  logRetentionInDays: 3

  environment:
    # Datadog unified service tagging
    DD_SERVICE: ${self:service}
    DD_ENV: ${self:provider.stage}
    DD_VERSION: ${env:APP_VERSION, "1.0.0"}

    # ddtrace runtime behaviour
    DD_TRACE_ENABLED: "true"
    DD_LOGS_INJECTION: "true"        # injects trace/span IDs into logs (requires Datadog Lambda Layer added by serverless-plugin-datadog)

    # AWS Lambda Powertools
    POWERTOOLS_SERVICE_NAME: ${self:service}
    POWERTOOLS_LOG_LEVEL: INFO

  iam:
    role:
      statements:
        # Allow the Lambda to write its own logs
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "arn:aws:logs:*:*:*"

# ---------------------------------------------------------------------------
# Package
# ---------------------------------------------------------------------------
package:
  individually: false
  patterns:
    - "!node_modules/**"
    - "!.venv/**"
    - "!venv/**"
    - "!tests/**"
    - "!**/__pycache__/**"
    - "!*.md"
    - "!Makefile"
    - "app/**"

# ---------------------------------------------------------------------------
# Functions
# ---------------------------------------------------------------------------
functions:
  api:
    handler: app.handler.lambda_handler
    description: "FastAPI web application with Datadog observability"
    events:
      # AWS Lambda Function URL (no API Gateway cost, simplest setup)
      - httpApi:
          path: /{proxy+}
          method: ANY
      # Root path
      - httpApi:
          path: /
          method: ANY
