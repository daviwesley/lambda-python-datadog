service: lambda-python-datadog

frameworkVersion: ">=3.0.0 <4.0.0"

# ---------------------------------------------------------------------------
# Plugins
# ---------------------------------------------------------------------------
plugins:
  - serverless-python-requirements  # bundles pip dependencies automatically
  - serverless-plugin-datadog       # instruments Lambda with Datadog

# ---------------------------------------------------------------------------
# Custom settings
# ---------------------------------------------------------------------------
custom:
  # ---- Python requirements -----------------------------------------------
  pythonRequirements:
    dockerizePip: non-linux   # use Docker only on non-Linux hosts
    slim: true                # strip tests / __pycache__ to reduce package size
    strip: false              # keep native library symbols (needed by ddtrace)
    useStaticCache: true
    useDownloadCache: true

  # ---- Datadog plugin -------------------------------------------------------
  # The plugin automatically adds the Datadog Lambda layer and injects the
  # dd-trace forwarder. Set DD_API_KEY (or DD_KMS_API_KEY) in the environment
  # or via AWS Secrets Manager / SSM — never hard-code it here.
  datadog:
    site: ${env:DD_SITE, "datadoghq.com"}
    apiKeySecretArn: ${env:DD_API_KEY_SECRET_ARN, ""}  # preferred: key stored in Secrets Manager
    enableDDTracing: true
    enableDDLogs: true
    enableEnhancedMetrics: true
    captureLambdaPayload: false       # set true to log full request/response (PII risk)
    logLevel: "warn"
    addLayers: true
    flushMetricsToLogs: true

# ---------------------------------------------------------------------------
# Provider
# ---------------------------------------------------------------------------
provider:
  name: aws
  runtime: python3.12
  stage: ${opt:stage, "dev"}
  region: ${opt:region, "us-east-1"}
  memorySize: 512
  timeout: 30
  logRetentionInDays: 14

  environment:
    # Datadog unified service tagging
    DD_SERVICE: ${self:service}
    DD_ENV: ${self:provider.stage}
    DD_VERSION: ${env:APP_VERSION, "1.0.0"}

    # ddtrace runtime behaviour
    DD_TRACE_ENABLED: "true"
    DD_LOGS_INJECTION: "true"        # injects trace/span IDs into log lines

    # AWS Lambda Powertools
    POWERTOOLS_SERVICE_NAME: ${self:service}
    POWERTOOLS_LOG_LEVEL: INFO
    POWERTOOLS_METRICS_NAMESPACE: LambdaPythonDatadog
    # Do not capture HTTP response bodies in X-Ray — Datadog APM already
    # captures them via TraceMiddleware, so this avoids redundant storage.
    POWERTOOLS_TRACER_CAPTURE_RESPONSE: "false"

  tracing:
    lambda: true                     # enables AWS X-Ray active tracing (used by Powertools Tracer)

  iam:
    role:
      statements:
        # Allow the Lambda to write its own logs
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "arn:aws:logs:*:*:*"
        # Allow Powertools Tracer to write X-Ray segments
        - Effect: Allow
          Action:
            - xray:PutTraceSegments
            - xray:PutTelemetryRecords
          Resource: "*"

# ---------------------------------------------------------------------------
# Package
# ---------------------------------------------------------------------------
package:
  individually: false
  patterns:
    - "!node_modules/**"
    - "!.venv/**"
    - "!venv/**"
    - "!tests/**"
    - "!**/__pycache__/**"
    - "!*.md"
    - "!Makefile"
    - "app/**"

# ---------------------------------------------------------------------------
# Functions
# ---------------------------------------------------------------------------
functions:
  api:
    handler: app.handler.lambda_handler
    description: "FastAPI web application with Datadog observability"
    events:
      # AWS Lambda Function URL (no API Gateway cost, simplest setup)
      - httpApi:
          path: /{proxy+}
          method: ANY
      # Root path
      - httpApi:
          path: /
          method: ANY
