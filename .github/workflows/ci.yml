name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "pytest.ini"
      - "requirements.txt"
  pull_request:
    branches: ["**"]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "pytest.ini"
      - "requirements.txt"

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv and Python 3.14
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check app tests

      - name: Test
        run: uv run pytest tests/ -v
