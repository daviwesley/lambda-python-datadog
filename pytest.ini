[pytest]
# Disable Datadog tracing during test runs so ddtrace doesn't try to
# connect to a local Agent and pollute test output.
# Disable Powertools X-Ray tracing for the same reason (no X-Ray daemon
# available in the test environment).
env =
    DD_TRACE_ENABLED=false
    DD_AGENT_HOST=localhost
    POWERTOOLS_TRACE_DISABLED=true
